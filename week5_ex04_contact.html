<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" , initial-scale="1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Index Page</title>
  </head>
  <body>
    <div class="mx-auto p-2" style="width: 500px">
      <h1 class="display-1">Contact Us</h1>
    </div>

    <header style="height: 300px; overflow: hidden">
      <div id="carouselExampleCaptions" class="carousel slide h-100">
        <div class="carousel-indicators">
          <button
            type="button"
            data-bs-target="#carouselExampleCaptions"
            data-bs-slide-to="0"
            class="active"
            aria-current="true"
            aria-label="Slide 1"
          ></button>
          <button
            type="button"
            data-bs-target="#carouselExampleCaptions"
            data-bs-slide-to="1"
            aria-label="Slide 2"
          ></button>
          <button
            type="button"
            data-bs-target="#carouselExampleCaptions"
            data-bs-slide-to="2"
            aria-label="Slide 3"
          ></button>
        </div>
        <div class="carousel-inner h-100">
          <div class="carousel-item active h-100">
            <img
              src="https://media.licdn.com/dms/image/v2/D4D22AQHK3GhOXlYIzg/feedshare-shrink_800/feedshare-shrink_800/0/1695452454119?e=2147483647&v=beta&t=6EeGpibryGVHiS097agSd84Qe81Gsh1cC-xZ9gHY_EQ"
              class="d-block w-100"
              alt="Reviews"
              class="d-block w-100 h-100"
              style="object-fit: contain; background-color: black"
            />
            <div class="carousel-caption d-none d-md-block">
              <h5></h5>
              <p></p>
            </div>
          </div>
          <div class="carousel-item">
            <img
              src="https://cdn.myportfolio.com/cf0233603e6f3ed7e0eb65959ffdde55/b60f3e9f-135f-4de5-a416-5c5702b3ba0c_rw_1920.jpg?h=98289c38f97e2e4648de46b01a75d8f2"
              class="d-block w-100"
              alt="Shop"
            />
            <div class="carousel-caption d-none d-md-block">
              <h5></h5>
              <p></p>
            </div>
          </div>
          <div class="carousel-item">
            <img
              src="https://www.blogher.com/wp-content/uploads/2021/03/the-pinterest-shop-womens-history-month.png"
              class="d-block w-100"
              alt="Shop"
            />
            <div class="carousel-caption d-none d-md-block">
              <h5></h5>
              <p></p>
            </div>
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselExampleCaptions"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselExampleCaptions"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    </header>

    <nav class="navbar" style="background-color: #e3f2fd" data-bs-theme="light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Navbar</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="products.html">Products</a>
            <a
              class="nav-link active"
              aria-current="Contact"
              href="contact.html"
              >Contact</a
            >
            <a class="nav-link" href="about.html">About</a>
          </div>
        </div>
      </div>
    </nav>

    <div
      class="mx-auto p-2"
      style="
        width: 10cm;
        font-family: &quot;Courier New&quot;, Courier, monospace;
      "
    >
      <h2 class="display-2">Send us an Email</h2>
    </div>
    <div class="container my-5">
      <div class="row g-5">
        <div class="col-md-6">
          <h2 class="mb-4">Send us a Message</h2>
          <form>
            <div class="mb-3">
              <input type="text" class="form-control" placeholder="Your Name" />
            </div>
            <div class="mb-3">
              <input
                type="email"
                class="form-control"
                placeholder="Your Email"
              />
            </div>
            <div class="mb-3">
              <textarea
                class="form-control"
                rows="5"
                placeholder="Your Message"
              ></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">
              Send Message
            </button>
          </form>
        </div>

        <div class="col-md-6 d-flex flex-column justify-content-center">
          <h2 class="mb-4">Contact Information</h2>
          <p><strong>📞 Phone:</strong> +27 60 193 0913</p>
          <p><strong>✉️ Email:</strong> beckham170903@gmail.com</p>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>

  <footer class="bg-dark text-white pt-5 pb-4">
    <div class="container text-center text-md-start">
      <div class="row">
        <div class="col-md-3 col-lg-3 col-xl-3 mx-auto mt-3">
          <h5 class="text-uppercase mb-4 font-weight-bold text-primary"></h5>
          <p>Providing Quality Second Hand Goods Across Cape Town.</p>
        </div>
        <div class="row align-items-center">
          <div class="col-md-7 col-lg-8">
            <p>© 2026 Copyright: <strong>Beckham Daniels</strong></p>
          </div>
        </div>
      </div>
    </div>
  </footer>
</html>
